jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin123"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  numExecutors: 0
  nodes:
    - permanent:
        name: "jenkins-agent-1"
        labelString: "agent"
        remoteFS: "/home/jenkins/agent"
        numExecutors: 1
        retentionStrategy: "always"
        launcher:
          inbound: {}
    - permanent:
        name: "jenkins-agent-2"
        labelString: "agent"
        remoteFS: "/home/jenkins/agent"
        numExecutors: 1
        retentionStrategy: "always"
        launcher:
          inbound: {}
    - permanent:
        name: "jenkins-ssh-agent"
        labelString: "ssh-agent"
        remoteFS: "/home/jenkins/agent"
        numExecutors: 1
        retentionStrategy: "always"
        launcher:
          ssh:
            host: "jenkins-ssh-agent"
            port: 22
            credentialsId: "ssh-agent-key"
            sshHostKeyVerificationStrategy:
              nonVerifyingKeyVerificationStrategy: {}

credentials:
  system:
    domainCredentials:
      - credentials:
          - basicSSHUserPrivateKey:
              id: "ssh-agent-key"
              username: "jenkins"
              description: "Cle SSH pour jenkins-ssh-agent"
              privateKeySource:
                fileOnMaster:
                  privateKeyFile: "/var/casc/ssh-agent-key"
