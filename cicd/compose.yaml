services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      JENKINS_PLUGINS: "workflow-aggregator git docker-workflow configuration-as-code ssh-slaves"
      CASC_JENKINS_CONFIG: /var/casc/jenkins.yaml
    entrypoint: >
      bash -c "jenkins-plugin-cli --plugins $$JENKINS_PLUGINS && /usr/local/bin/jenkins.sh"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins.yaml:/var/casc/jenkins.yaml:ro
      - ./ssh-agent-key:/var/casc/ssh-agent-key:ro
      - ..:/var/jenkins_home/workspace-source:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/login > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

  jenkins-agent-1:
    image: jenkins/inbound-agent:latest-jdk21
    container_name: jenkins-agent-1
    restart: unless-stopped
    depends_on:
      jenkins:
        condition: service_healthy
    environment:
      JENKINS_URL: http://jenkins:8080
      JENKINS_AGENT_NAME: jenkins-agent-1
      JENKINS_USER: admin
      JENKINS_PASSWORD: admin123
    volumes:
      - ./agent-entrypoint.sh:/agent-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/agent-entrypoint.sh"]

  jenkins-agent-2:
    image: jenkins/inbound-agent:latest-jdk21
    container_name: jenkins-agent-2
    restart: unless-stopped
    depends_on:
      jenkins:
        condition: service_healthy
    environment:
      JENKINS_URL: http://jenkins:8080
      JENKINS_AGENT_NAME: jenkins-agent-2
      JENKINS_USER: admin
      JENKINS_PASSWORD: admin123
    volumes:
      - ./agent-entrypoint.sh:/agent-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/agent-entrypoint.sh"]

  jenkins-ssh-agent:
    build:
      context: ./cicd2
      dockerfile: Dockerfile.ssh-agent
    container_name: jenkins-ssh-agent
    restart: unless-stopped
    environment:
      JENKINS_AGENT_SSH_PUBKEY: ${JENKINS_AGENT_SSH_PUBKEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  registry:
    image: registry:3
    container_name: registry
    restart: unless-stopped
    ports:
      - "5000:5000"

volumes:
  jenkins_home:
