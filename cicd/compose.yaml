services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_PLUGINS: "workflow-aggregator git docker-workflow"
    entrypoint: >
      bash -c "jenkins-plugin-cli --plugins $$JENKINS_PLUGINS && /usr/local/bin/jenkins.sh"
    volumes:
      - jenkins_home:/var/jenkins_home

  jenkins-agent-1:
    image: jenkins/agent:latest
    container_name: jenkins-agent-1
    restart: unless-stopped

  jenkins-agent-2:
    image: jenkins/agent:latest
    container_name: jenkins-agent-2
    restart: unless-stopped

  jenkins-cli:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins-cli
    depends_on:
      - jenkins
    restart: "no"
    entrypoint: >
      bash -c "
      curl -s -o /tmp/jenkins-cli.jar http://jenkins:8080/jnlpJars/jenkins-cli.jar &&
      echo '<slave><name>jenkins-agent-1</name><remoteFS>/home/jenkins/agent</remoteFS><numExecutors>1</numExecutors><mode>NORMAL</mode><retentionStrategy class=\"hudson.slaves.RetentionStrategy$$Always\"/><launcher class=\"hudson.slaves.JNLPLauncher\"/><label></label><nodeProperties/></slave>' |
      java -jar /tmp/jenkins-cli.jar -s http://jenkins:8080 -auth $$JENKINS_USER:$$JENKINS_TOKEN create-node jenkins-agent-1 &&
      echo '<slave><name>jenkins-agent-2</name><remoteFS>/home/jenkins/agent</remoteFS><numExecutors>1</numExecutors><mode>NORMAL</mode><retentionStrategy class=\"hudson.slaves.RetentionStrategy$$Always\"/><launcher class=\"hudson.slaves.JNLPLauncher\"/><label></label><nodeProperties/></slave>' |
      java -jar /tmp/jenkins-cli.jar -s http://jenkins:8080 -auth $$JENKINS_USER:$$JENKINS_TOKEN create-node jenkins-agent-2
      "
    environment:
      JENKINS_USER: ${JENKINS_USER}
      JENKINS_TOKEN: ${JENKINS_TOKEN}

  jenkins-ssh-agent:
    image: jenkins/ssh-agent:latest
    container_name: jenkins-ssh-agent
    restart: unless-stopped
    environment:
      JENKINS_AGENT_SSH_PUBKEY: ${JENKINS_AGENT_SSH_PUBKEY}

  registry:
    image: registry:3
    container_name: registry
    restart: unless-stopped
    ports:
      - "5000:5000"

volumes:
  jenkins_home:
