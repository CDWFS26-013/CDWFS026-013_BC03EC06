services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_PLUGINS: "workflow-aggregator git docker-workflow"
    entrypoint: >
      bash -c "jenkins-plugin-cli --plugins $$JENKINS_PLUGINS && /usr/local/bin/jenkins.sh"
    volumes:
      - jenkins_home:/var/jenkins_home

  jenkins-agent-1:
    image: jenkins/agent:latest
    container_name: jenkins-agent-1
    restart: unless-stopped

  jenkins-agent-2:
    image: jenkins/agent:latest
    container_name: jenkins-agent-2
    restart: unless-stopped

volumes:
  jenkins_home: